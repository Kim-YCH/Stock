<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockLab</title>
  <meta name="theme-color" content="#050816" />
  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">StockLab</div>
      <div class="app-version" id="appVersion">v10.1</div>
      <nav class="nav">
        <button class="nav-btn active" data-page="dashboard">首頁總覽</button>
        <button class="nav-btn" data-page="portfolio">我的庫存</button>
        <button class="nav-btn" data-page="analysis">線圖分析</button>
        <button class="nav-btn" data-page="transactions">交易紀錄</button>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h1 id="pageTitle">首頁總覽</h1>
          <div class="muted" id="pageSubtitle">盤後大盤、關注股票與技術訊號</div>
          <div id="dashboardUpdateStatus" class="update-status">讀取更新狀態...</div>
        </div>
        <div class="top-actions">
          <button id="btnUpdateDaily">更新盤後資料</button>
          <button id="btnBackfillHistory">回補歷史資料</button>
          <button id="btnRefreshVersion">更新版本</button>
          <div class="muted" id="apiStatus">尚未連線</div>
        </div>
      </div>

      <section id="dashboardPage" class="page active">
        <div id="marketCards" class="grid-4"></div>

        <div class="panel">
          <div class="panel-header">
            <div>
              <h2>我的關注股票</h2>
            </div>
            <button id="btnToggleWatchForm">＋ 新增關注股票</button>
          </div>

          <form id="watchlistForm" class="watch-form hidden">
            <label class="full">股票代號<input id="watchSymbol" name="symbol" type="text" inputmode="numeric" required placeholder="2330" autocomplete="off" /></label>
            <label class="full">備註<input name="note" type="text" placeholder="ETF 長期觀察" /></label>
            <label>目標價<input name="target_price" type="number" step="0.0001" placeholder="250" /></label>
            <label>提醒價<input name="alert_price" type="number" step="0.0001" placeholder="230" /></label>
            <label class="check-label full">
              <input name="backfill" type="checkbox" />
              加入後自動回補歷史資料
            </label>
            <div class="form-actions full">
              <button type="submit">加入關注股票</button>
              <span id="watchFormMessage" class="muted"></span>
            </div>
          </form>

          <div id="emptyWatchlist" class="empty-state hidden">
            <div>目前尚未加入關注股票</div>
            <button id="btnEmptyAddWatch">新增關注股票</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>股票</th>
                  <th>收盤</th>
                  <th>RSI</th>
                  <th>量比</th>
                  <th>分數</th>
                  <th>狀態</th>
                  <th>訊號</th>
                  <th>迷你線圖</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="watchlistBody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section id="portfolioPage" class="page">
        <div id="portfolioSummary" class="grid-4"></div>

        <div class="panel">
          <div class="panel-header">
            <div>
              <h2>我的庫存</h2>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>股票</th>
                  <th>股數</th>
                  <th>平均成本</th>
                  <th>收盤價</th>
                  <th>市值</th>
                  <th>未實現損益</th>
                  <th>報酬率</th>
                  <th>技術狀態</th>
                </tr>
              </thead>
              <tbody id="portfolioBody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section id="analysisPage" class="page">
        <div class="panel">
          <div class="panel-header">
            <div>
              <h2 id="analysisTitle">線圖分析</h2>

            </div>

            <div class="inline-form">
              <input id="analysisSymbol" type="text" inputmode="numeric" placeholder="輸入股票代號，例如 006208" />
              <button id="btnLoadAnalysis">查詢</button>
            </div>
          </div>

          <div class="analysis-layout">
            <div>
              <div class="chart-wrap">
                <svg id="mainChart" viewBox="0 0 920 420" preserveAspectRatio="none"></svg>
                <div id="chartTooltip" class="chart-tooltip" hidden></div>
              </div>

              <div class="legend">
                <span class="legend-item price-line">收盤價</span>
                <span class="legend-item ma-line">MA20</span>
                <span class="legend-item cost-line">平均成本</span>
              </div>
            </div>

            <aside>
              <div id="indicatorCards" class="metric-grid"></div>
            </aside>
          </div>
        </div>

        <div class="panel">
          <h2>近期技術訊號</h2>
          <div id="signalsBox"></div>
        </div>
      </section>

      <section id="transactionsPage" class="page">
        <div class="panel">
          <div class="panel-header">
            <div>
              <h2>新增交易</h2>
              <div class="muted">先支援 BUY / SELL / DIVIDEND</div>
            </div>
          </div>

          <form id="transactionForm" class="form-grid">
            <label>日期<input name="date" type="date" required /></label>
            <label>類型
              <select name="action">
                <option value="BUY">買進 BUY</option>
                <option value="SELL">賣出 SELL</option>
                <option value="DIVIDEND">股息 DIVIDEND</option>
              </select>
            </label>
            <label>股票代號<input name="symbol" type="text" inputmode="numeric" required placeholder="2330" /></label>
            <label>股數<input name="quantity" type="number" step="0.0001" required /></label>
            <label>價格<input name="price" type="number" step="0.0001" required /></label>
            <label>手續費<input name="fee" type="number" step="0.0001" value="0" /></label>
            <label>稅<input name="tax" type="number" step="0.0001" value="0" /></label>
            <label class="full">備註<input name="note" placeholder="長期投資 / 短線觀察" /></label>
            <div class="form-actions full">
              <button type="submit">新增交易</button>
              <span id="formMessage" class="muted"></span>
            </div>
          </form>
        </div>

        <div class="panel">
          <h2>交易紀錄</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>日期</th>
                  <th>類型</th>
                  <th>股票</th>
                  <th>股數</th>
                  <th>價格</th>
                  <th>手續費</th>
                  <th>稅</th>
                  <th>備註</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="transactionsBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
